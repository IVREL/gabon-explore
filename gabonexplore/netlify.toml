# ============================
# NETLIFY CONFIGURATION
# GabonExplore
# ============================

[build]
  publish = "."
  command = "echo 'Static site — no build step needed'"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://js.stripe.com https://fonts.googleapis.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; frame-src https://js.stripe.com; connect-src 'self' https://api.anthropic.com https://api.stripe.com;"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
[[redirects]]
  from = "/reservation"
  to = "/pages/reservations.html"
  status = 301

[[redirects]]
  from = "/reserve"
  to = "/pages/reservations.html"
  status = 301

# Netlify Functions (for Stripe backend)
[functions]
  directory = "netlify/functions"

# Form handling (Netlify Forms for contact)
[build.environment]
  NODE_VERSION = "18"
